<section class="profile-bar d-flex flex-column align-items-center text-center py-3">
  <img [src]="urlFoto" class="profile-img rounded-circle mb-2"
       [ngClass]="estaOnline ? 'profile-online' : 'profile-offline'">

  <h5 class="profile-name mb-1">{{ nombre }}</h5>
  <p class="profile-user mb-2">{{ usuario }}</p>

  <div class="d-flex align-items-center gap-2 mb-2">
    <span class="status-dot" [ngClass]="estaOnline ? 'dot-online' : 'dot-offline'"></span>
    <span class="status-text">{{ estaOnline ? 'Conectado' : 'Desconectado' }}</span>
  </div>

  <button class="btn profile-btn" (click)="toggleOnline()">
    {{ estaOnline ? 'Desconectarse' : 'Conectarse' }}
  </button>
</section>
